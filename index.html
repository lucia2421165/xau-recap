<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8"/>
<meta name="viewport" content="width=device-width, initial-scale=1.0"/>
<title>XAU Recap Tracker</title>
<link href="https://fonts.googleapis.com/css2?family=Space+Mono:wght@400;700&family=Inter:wght@400;500;600&display=swap" rel="stylesheet"/>
<link rel="icon" type="image/x-icon" href="favicon.ico"/>
<link rel="icon" type="image/svg+xml" href="favicon.svg"/>
<meta name="theme-color" content="#151820"/>
<meta name="apple-mobile-web-app-capable" content="yes"/>
<meta name="apple-mobile-web-app-status-bar-style" content="black-translucent"/>
<meta name="apple-mobile-web-app-title" content="XAU Recap"/>
<style>
:root {
  --bg: #151820;
  --bg2: #1C2030;
  --border: #2A2E3A;
  --border2: #3E4560;
  --text: #F0F6FF;
  --muted: #8A9BBC;
  --dim: #4A5470;
  --ink: #4A7FA5;
  --r: 4px;
  --rlg: 8px;
}
*,*::before,*::after{box-sizing:border-box;margin:0;padding:0;}
body{background:var(--bg);color:var(--text);font-family:'Inter',sans-serif;min-height:100vh;}
.app{max-width:860px;margin:0 auto;padding:2.5rem 1.5rem 4rem;}
header{display:flex;align-items:flex-start;justify-content:space-between;margin-bottom:2.5rem;padding-bottom:1.5rem;border-bottom:1px solid var(--border);}
.logo{display:flex;align-items:center;gap:10px;margin-bottom:4px;}
.logo-box{width:28px;height:28px;border:1.5px solid var(--ink);border-radius:3px;display:flex;align-items:center;justify-content:center;}
.logo-box svg{width:14px;height:14px;}
.logo-text{font-size:16px;font-weight:700;color:var(--ink);letter-spacing:.08em;text-transform:uppercase;font-family:'Space Mono',monospace;}
.logo-sub{font-size:10px;color:var(--muted);letter-spacing:.1em;text-transform:uppercase;font-family:'Space Mono',monospace;margin-left:38px;}
.sync{display:flex;align-items:center;gap:6px;font-family:'Space Mono',monospace;font-size:10px;color:var(--muted);padding:5px 10px;border:1px solid var(--border);border-radius:20px;}
.sync-dot{width:5px;height:5px;border-radius:50%;background:var(--dim);}
.sync-dot.on{background:#4A7FA5;}
.sync-dot.syncing{background:#888;animation:pulse 1s infinite;}
@keyframes pulse{0%,100%{opacity:1}50%{opacity:.2}}
.stats{display:grid;grid-template-columns:repeat(3,minmax(0,1fr));gap:10px;margin-bottom:2rem;}
.stat{border:1px solid var(--border);border-radius:var(--r);padding:1rem 1.25rem;}
.stat-label{font-size:9px;text-transform:uppercase;letter-spacing:.15em;color:var(--muted);font-family:'Space Mono',monospace;margin-bottom:8px;}
.stat-val{font-size:30px;font-weight:700;color:var(--ink);line-height:1;margin-bottom:3px;font-family:'Space Mono',monospace;}
.stat-sub{font-size:10px;color:var(--muted);font-family:'Space Mono',monospace;}
.month-nav{display:flex;align-items:center;justify-content:space-between;margin-bottom:1rem;}
.month-name{font-size:13px;font-weight:700;color:var(--text);letter-spacing:.1em;text-transform:uppercase;font-family:'Space Mono',monospace;}
.nav-btns{display:flex;gap:6px;}
.nav-btn{background:none;border:1px solid var(--border);border-radius:var(--r);width:30px;height:30px;display:flex;align-items:center;justify-content:center;cursor:pointer;color:var(--muted);font-size:13px;transition:.12s;}
.nav-btn:hover{border-color:var(--ink);color:var(--ink);}
.calendar{background:var(--bg);border:1px solid var(--border);border-radius:var(--rlg);overflow:hidden;}
.cal-head{display:grid;grid-template-columns:40px repeat(5,minmax(0,1fr));border-bottom:1px solid var(--border);background:var(--bg2);}
.cal-head-cell{padding:10px 0;text-align:center;font-size:9px;letter-spacing:.2em;text-transform:uppercase;color:var(--muted);font-family:'Space Mono',monospace;}
.cal-head-cell:first-child{border-right:1px solid var(--border);}
.week-row{display:grid;grid-template-columns:40px repeat(5,minmax(0,1fr));border-bottom:1px solid var(--border);}
.week-row:last-child{border-bottom:none;}
.wn-cell{display:flex;align-items:center;justify-content:center;font-size:8px;color:var(--dim);font-family:'Space Mono',monospace;border-right:1px solid var(--border);background:var(--bg2);}
.day-cell{padding:10px 8px;border-left:1px solid var(--border);cursor:pointer;display:flex;flex-direction:column;gap:6px;min-height:72px;position:relative;transition:background .1s;}
.day-cell.first{border-left:none;}
.day-cell.empty{cursor:default;}
.day-cell.future{opacity:.25;cursor:default;}
.day-cell:not(.empty):not(.future):hover{background:var(--bg2);}
.day-cell.done{background:var(--ink);}
.day-cell.done:hover{background:#3A6A8A;}
.day-cell.today::after{content:'';position:absolute;top:0;left:0;right:0;height:2px;background:var(--ink);}
.day-num{font-size:12px;font-weight:700;color:var(--muted);font-family:'Space Mono',monospace;line-height:1;}
.day-cell.today .day-num{color:var(--ink);}
.day-cell.done .day-num{color:#E8F2FA;}
.check{width:18px;height:18px;border-radius:50%;border:1px solid var(--dim);display:flex;align-items:center;justify-content:center;}
.day-cell.done .check{background:#E8F2FA;border-color:#E8F2FA;}
.check svg{width:9px;height:9px;stroke:#4A7FA5;stroke-width:2.5;fill:none;display:none;}
.day-cell.done .check svg{display:block;}
.day-note{font-size:9px;color:rgba(232,242,250,.5);font-family:'Space Mono',monospace;line-height:1.3;overflow:hidden;display:-webkit-box;-webkit-line-clamp:2;-webkit-box-orient:vertical;}
.day-cell:not(.done) .day-note{color:var(--muted);}
.legend{display:flex;gap:20px;margin-top:1rem;padding:0 2px;}
.legend-item{display:flex;align-items:center;gap:6px;font-size:10px;color:var(--muted);font-family:'Space Mono',monospace;}
.legend-dot{width:10px;height:10px;border-radius:2px;}
/* MODAL */
.backdrop{position:fixed;inset:0;background:rgba(0,0,0,.4);display:flex;align-items:center;justify-content:center;z-index:100;opacity:0;pointer-events:none;transition:opacity .18s;}
.backdrop.open{opacity:1;pointer-events:all;}
.modal{background:#1C2030;border:1px solid var(--border2);border-radius:var(--rlg);padding:1.75rem;width:320px;max-width:calc(100vw - 2rem);transform:translateY(10px);transition:transform .18s;}
.backdrop.open .modal{transform:translateY(0);}
.modal-badge{font-family:'Space Mono',monospace;font-size:9px;letter-spacing:.12em;text-transform:uppercase;color:var(--muted);border:1px solid var(--border);border-radius:2px;padding:3px 7px;display:inline-block;margin-bottom:10px;}
.modal-title{font-size:16px;font-weight:600;color:var(--ink);margin-bottom:3px;}
.modal-sub{font-size:11px;color:var(--muted);font-family:'Space Mono',monospace;margin-bottom:1.25rem;}
.toggle-q{font-size:10px;text-transform:uppercase;letter-spacing:.12em;color:var(--muted);margin-bottom:8px;font-family:'Space Mono',monospace;}
.toggle-group{display:grid;grid-template-columns:1fr 1fr;gap:8px;margin-bottom:1.25rem;}
.toggle-btn{padding:11px;border-radius:var(--r);border:1px solid var(--border);background:var(--bg2);color:var(--muted);font-size:12px;font-weight:500;font-family:'Space Mono',monospace;cursor:pointer;transition:.12s;}
.toggle-btn:hover{border-color:var(--border2);color:var(--text);}
.toggle-btn.yes{background:var(--ink);border-color:var(--ink);color:#E8F2FA;}
.toggle-btn.no{background:var(--bg2);border-color:var(--ink);color:var(--ink);}
.note-label{font-size:10px;text-transform:uppercase;letter-spacing:.12em;color:var(--muted);font-family:'Space Mono',monospace;margin-bottom:6px;}
.note-input{width:100%;background:var(--bg2);border:1px solid var(--border);border-radius:var(--r);padding:10px 12px;font-size:12px;font-family:'Space Mono',monospace;color:var(--text);resize:none;height:60px;outline:none;transition:.12s;margin-bottom:1.25rem;}
.note-input:focus{border-color:var(--ink);}
.modal-actions{display:flex;gap:8px;justify-content:flex-end;}
.btn-cancel{background:none;border:1px solid var(--border);border-radius:var(--r);padding:8px 14px;font-size:11px;font-family:'Space Mono',monospace;color:var(--muted);cursor:pointer;transition:.12s;}
.btn-cancel:hover{border-color:var(--border2);color:var(--text);}
.btn-save{background:var(--ink);border:none;border-radius:var(--r);padding:8px 18px;font-size:11px;font-family:'Space Mono',monospace;font-weight:700;color:#E8F2FA;cursor:pointer;transition:opacity .12s;}
.btn-save:hover{opacity:.8;}
.toast{position:fixed;bottom:1.5rem;right:1.5rem;background:var(--ink);border-radius:var(--r);padding:10px 16px;font-size:11px;font-family:'Space Mono',monospace;color:#E8F2FA;z-index:200;opacity:0;transform:translateY(6px);transition:all .2s;pointer-events:none;}
.toast.show{opacity:1;transform:translateY(0);}
.btn-reset{background:none;border:1px solid var(--border);border-radius:var(--r);padding:5px 12px;font-size:10px;font-family:'Space Mono',monospace;color:var(--muted);cursor:pointer;letter-spacing:.05em;transition:.12s;}
.btn-reset:hover{border-color:#cc0000;color:#cc0000;}
.confirm-bar{display:none;align-items:center;gap:10px;padding:10px 14px;background:#1E1520;border:1px solid #5A2030;border-radius:var(--r);margin-bottom:1rem;font-size:11px;font-family:'Space Mono',monospace;color:#cc0000;}
.confirm-bar.show{display:flex;}
.confirm-bar button{background:none;border:1px solid currentColor;border-radius:var(--r);padding:4px 10px;font-size:10px;font-family:'Space Mono',monospace;cursor:pointer;transition:.12s;}
.confirm-bar .confirm-yes{color:#cc0000;}
.confirm-bar .confirm-no{color:var(--muted);border-color:var(--border);}
.confirm-bar .confirm-no:hover{color:var(--text);}
@media(max-width:600px){
  .app{padding:1rem .75rem 3rem;}
  .stat{padding:.75rem;}
  .stat-val{font-size:22px;}
  .day-cell{padding:7px 5px;min-height:58px;}
  .day-num{font-size:10px;}
  .check{width:14px;height:14px;}
  .day-note{display:none;}
  header{flex-direction:column;gap:10px;}
}
</style>
</head>

<script>
// ── Constantes ────────────────────────────────────────────────────────────────
const MONTHS = ['Enero','Febrero','Marzo','Abril','Mayo','Junio','Julio','Agosto','Septiembre','Octubre','Noviembre','Diciembre'];
const WDAYS  = ['Lun','Mar','Mié','Jue','Vie'];
const LS_KEY = 'xau-recap-v3';

// ── Estado ────────────────────────────────────────────────────────────────────
let data = {};        // { "YYYY-MM-DD": { recap: bool, note: str } }
let viewYear  = new Date().getFullYear();
let viewMonth = new Date().getMonth();
let modalKey  = null;
let pending   = null; // true | false | null

// ── Storage ───────────────────────────────────────────────────────────────────
function lsSave() { try { localStorage.setItem(LS_KEY, JSON.stringify(data)); } catch(e){} }
function lsLoad() {
  try {
    const raw = JSON.parse(localStorage.getItem(LS_KEY) || '{}');
    // migrar claves viejas sin zero-padding ("2026-3-5" → "2026-03-05")
    const out = {};
    for (const k of Object.keys(raw)) {
      const p = k.split('-');
      const nk = p.length === 3
        ? `${p[0]}-${p[1].padStart(2,'0')}-${p[2].padStart(2,'0')}`
        : k;
      out[nk] = raw[k];
    }
    return out;
  } catch(e) { return {}; }
}

// ── Helpers de fecha ──────────────────────────────────────────────────────────
function dateKey(y, m, d) {
  return `${y}-${String(m+1).padStart(2,'0')}-${String(d).padStart(2,'0')}`;
}
function dtKey(dt) {
  return `${dt.getFullYear()}-${String(dt.getMonth()+1).padStart(2,'0')}-${String(dt.getDate()).padStart(2,'0')}`;
}
function today() { const d = new Date(); d.setHours(0,0,0,0); return d; }
function isFuture(y, m, d) { return new Date(y,m,d) > today(); }
function isToday(y, m, d)  { const t = today(); return t.getFullYear()===y && t.getMonth()===m && t.getDate()===d; }
function isWeekend(dt)     { return dt.getDay()===0 || dt.getDay()===6; }
function prevDay(dt)       { const d=new Date(dt); d.setDate(d.getDate()-1); return d; }

// ── Racha ─────────────────────────────────────────────────────────────────────
function calcStreak() {
  // 1. Buscar hacia atrás el día hábil más reciente con recap=true
  let cur = today();
  let found = false;
  for (let i = 0; i < 730; i++) {
    if (!isWeekend(cur) && data[dtKey(cur)]?.recap === true) { found=true; break; }
    cur = prevDay(cur);
  }
  if (!found) return 0;

  // 2. Desde ese día, contar hacia atrás días hábiles consecutivos con recap=true
  //    Fines de semana se saltan sin romper.
  //    Cualquier día hábil sin recap=true detiene el conteo.
  let streak = 0;
  for (let i = 0; i < 730; i++) {
    if (isWeekend(cur)) { cur=prevDay(cur); continue; }
    if (data[dtKey(cur)]?.recap === true) { streak++; cur=prevDay(cur); }
    else { break; }
  }
  return streak;
}

// ── Estadísticas del mes ──────────────────────────────────────────────────────
function updateStats() {
  const days = new Date(viewYear, viewMonth+1, 0).getDate();
  let total=0, done=0;
  for (let d=1; d<=days; d++) {
    const dow = new Date(viewYear, viewMonth, d).getDay();
    if (dow>=1 && dow<=5 && !isFuture(viewYear, viewMonth, d)) {
      total++;
      if (data[dateKey(viewYear, viewMonth, d)]?.recap===true) done++;
    }
  }
  document.getElementById('statCount').textContent = done;
  document.getElementById('statOf').textContent    = `de ${total} días`;
  document.getElementById('statPct').textContent   = total ? Math.round(done/total*100)+'%' : '0%';
  document.getElementById('statStreak').textContent = calcStreak();
}

// ── Semanas del mes ───────────────────────────────────────────────────────────
function getWeeks(y, m) {
  const first = new Date(y, m, 1).getDay();
  const total = new Date(y, m+1, 0).getDate();
  const offset = first===0 ? 6 : first-1;
  const weeks = [];
  let d = 1 - offset;
  while (d <= total) {
    const week = [];
    for (let i=0; i<5; i++, d++) week.push(d>=1 && d<=total ? d : null);
    d += 2; // saltar fin de semana
    const first2 = week.find(x=>x!==null);
    if (first2!=null) {
      const dt = new Date(y,m,first2);
      dt.setDate(dt.getDate()+4-(dt.getDay()||7));
      const wn = Math.ceil(((dt-new Date(Date.UTC(dt.getUTCFullYear(),0,1)))/86400000+1)/7);
      weeks.push({days:week, wn});
    }
  }
  return weeks;
}

// ── Render calendario ─────────────────────────────────────────────────────────
function render() {
  document.getElementById('monthName').textContent = `${MONTHS[viewMonth]} ${viewYear}`;
  const body = document.getElementById('calBody');
  body.innerHTML = '';

  getWeeks(viewYear, viewMonth).forEach(({days, wn}) => {
    const row = document.createElement('div');
    row.className = 'week-row';

    const wnCell = document.createElement('div');
    wnCell.className = 'wn-cell';
    wnCell.textContent = `S${wn}`;
    row.appendChild(wnCell);

    days.forEach((d, i) => {
      const cell = document.createElement('div');
      if (d===null) { cell.className='day-cell empty'; row.appendChild(cell); return; }

      const k       = dateKey(viewYear, viewMonth, d);
      const entry   = data[k];
      const future  = isFuture(viewYear, viewMonth, d);
      const tod     = isToday(viewYear, viewMonth, d);
      const hasRecap = entry?.recap === true;

      let cls = 'day-cell';
      if (i===0)    cls += ' first';
      if (future)   cls += ' future';
      if (hasRecap) cls += ' done';
      if (tod)      cls += ' today';
      cell.className = cls;

      // Número
      const num = document.createElement('div');
      num.className = 'day-num';
      num.textContent = d;
      cell.appendChild(num);

      // Check
      const chk = document.createElement('div');
      chk.className = 'check';
      chk.innerHTML = '<svg viewBox="0 0 10 10"><polyline points="2,5 4.5,7.5 8,2.5"/></svg>';
      cell.appendChild(chk);

      // Nota
      if (entry?.note) {
        const n = document.createElement('div');
        n.className = 'day-note';
        n.textContent = entry.note;
        cell.appendChild(n);
      }

      if (!future) cell.onclick = () => openModal(d, viewMonth, viewYear, k);
      row.appendChild(cell);
    });

    body.appendChild(row);
  });

  updateStats();
}

// ── Navegación de mes ─────────────────────────────────────────────────────────
function changeMonth(dir) {
  viewMonth += dir;
  if (viewMonth<0)  { viewMonth=11; viewYear--; }
  if (viewMonth>11) { viewMonth=0;  viewYear++; }
  render();
}
window.changeMonth = changeMonth;

// ── Modal ─────────────────────────────────────────────────────────────────────
function openModal(d, m, y, k) {
  modalKey = k;
  const dow = new Date(y,m,d).getDay();
  document.getElementById('mBadge').textContent  = dateKey(y,m,d);
  document.getElementById('mTitle').textContent  = `${WDAYS[dow-1]} ${d} de ${MONTHS[m]}`;
  document.getElementById('noteInput').value     = data[k]?.note || '';
  pending = data[k]?.recap ?? null;
  updateToggle();
  document.getElementById('backdrop').classList.add('open');
}
function closeModal() {
  document.getElementById('backdrop').classList.remove('open');
  modalKey=null; pending=null;
}
function setPending(v) { pending=v; updateToggle(); }
function updateToggle() {
  document.getElementById('btnYes').className = 'toggle-btn' + (pending===true  ? ' yes' : '');
  document.getElementById('btnNo').className  = 'toggle-btn' + (pending===false ? ' no'  : '');
}
window.closeModal = closeModal;
window.setPending = setPending;

async function saveEntry() {
  if (pending===null) { showToast('Selecciona si hubo recap o no'); return; }
  const was = pending;
  const entry = { recap: was, note: document.getElementById('noteInput').value.trim(), ts: Date.now() };
  data[modalKey] = entry;
  lsSave(); render(); closeModal();
  showToast(was ? '✓ Recap guardado' : 'Día registrado sin recap');
  if (window._useFirebase && window._db) {
    try { await window._setDoc(window._doc(window._db,'recap',modalKey||'x'), entry); } catch(e){}
  }
}
window.saveEntry = saveEntry;

// ── Toast ─────────────────────────────────────────────────────────────────────
function showToast(msg) {
  const t = document.getElementById('toast');
  t.textContent = msg; t.classList.add('show');
  setTimeout(()=>t.classList.remove('show'), 2200);
}

// ── Sync indicator ────────────────────────────────────────────────────────────
function setSyncState(s) {
  const dot = document.getElementById('syncDot');
  const lbl = document.getElementById('syncLabel');
  dot.className = 'sync-dot' + (s==='on' ? ' on' : s==='syncing' ? ' syncing' : '');
  lbl.textContent = s==='on' ? 'sincronizado' : s==='syncing' ? 'sincronizando...' : 'local';
}

// ── Firebase ──────────────────────────────────────────────────────────────────
async function fbLoad() {
  if (!window._useFirebase || !window._db) return;
  setSyncState('syncing');
  window._onSnapshot(window._collection(window._db,'recap'), snap => {
    snap.forEach(d => { data[d.id] = d.data(); });
    lsSave(); render(); setSyncState('on');
  });
}

// ── Reset ────────────────────────────────────────────────────────────────────
function askReset() { document.getElementById('confirmBar').classList.add('show'); }
function cancelReset() { document.getElementById('confirmBar').classList.remove('show'); }
async function confirmReset() {
  data = {};
  lsSave();
  // Borrar también en Firebase si está conectado
  if (window._useFirebase && window._db) {
    try {
      const snap = await new Promise(res => {
        const unsub = window._onSnapshot(window._collection(window._db,'recap'), s => { unsub(); res(s); });
      });
      for (const d of snap.docs) {
        await window._setDoc(window._doc(window._db,'recap',d.id), {_deleted:true, ts:Date.now()});
      }
    } catch(e){}
  }
  cancelReset();
  render();
  showToast('Todos los registros borrados');
}
window.askReset = askReset;
window.cancelReset = cancelReset;
window.confirmReset = confirmReset;

// ── Init ──────────────────────────────────────────────────────────────────────
data = lsLoad();
render();
if (window._firebaseReady) fbLoad();
else window.addEventListener('firebaseReady', fbLoad, {once:true});
</script>
</body>
</html>
